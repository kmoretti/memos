<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>离线 - 克喵的朋友圈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
    }
    .offline-card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 360px;
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    p {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: #5b7a9d;
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4a6a8a; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">&#128268;</div>
    <h1>暂无网络连接</h1>
    <p>请检查你的网络设置后重试</p>
    <button onclick="location.reload()">重试</button>
  </div>
</body>
</html>
